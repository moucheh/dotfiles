[notification]
background_opacity = 0.64999998547136784
layer = "overlay"

[osd]
background_opacity = 0.59999998658895493

[plugin_settings."noctalia/screen_recorder"]
restore_portal = true

[plugins]
enabled = [ "noctalia/screen_recorder" ]

[shell]
avatar_path = "/var/lib/AccountsService/icons/moucheh"
clipboard_auto_paste = "ctrl_shift_v"
niri_overview_type_to_launch_enabled = true
polkit_agent = true
screen_time_enabled = true
settings_show_advanced = true
time_format = "{:%I:%M}"

    [shell.animation]
    enabled = true

    [shell.launcher]
    app_grid = true
    session_search = true

    [shell.panel]
    clipboard_placement = "attached"
    launcher_placement = "attached"
    polkit_placement = "attached"
    transparency_mode = "glass"

    [[shell.session.actions]]
    action = "lock"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "l"
    variant = "default"

    [[shell.session.actions]]
    action = "logout"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "e"
    variant = "default"

    [[shell.session.actions]]
    action = "lock_and_suspend"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "Ctrl+l"
    variant = "default"

    [[shell.session.actions]]
    action = "reboot"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "r"
    variant = "default"

    [[shell.session.actions]]
    action = "shutdown"
    countdown_seconds = 0.0
    enabled = true
    shortcut = "p"
    variant = "destructive"

[theme]
custom_palette = "abstract-mc"
source = "custom"

    [theme.templates]
    builtin_ids = [ "gtk3", "gtk4", "kcolorscheme", "qt" ]
    community_ids = [ "zed", "obs", "yazi" ]

[wallpaper]
directory = "/home/moucheh/.dotfiles/images"
enabled = false

    [wallpaper.default]
    path = "/home/moucheh/.dotfiles/images/abstract.jpg"

    [wallpaper.last]
    path = "/home/moucheh/.dotfiles/images/abstract.jpg"

[widget.active_window]
max_length = 150
min_length = 40

[widget.clock]
format = "{:%d ~ %I:%M}"

[widget.launcher]
custom_image = "/usr/share/noctalia/assets/images/distros/fedora.svg"
custom_image_colorize = true

[widget.media]
hide_when_no_media = true
title_scroll = "always"

[widget.privacy]
hide_inactive = true

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.sysmon]
display = "text"

[widget.tray]
hidden = [ "nm-applet", "blueman-tray" ]

[widget.weather]
show_condition = false
