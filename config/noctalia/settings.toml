[dock]
auto_hide = true
background_opacity = 0.64999998547136784
enabled = true
launcher_position = "end"
pinned = [ "brave-browser", "freetube", "footclient" ]
radius = 32
reserve_space = false
show_dots = true

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]
pre_action_fade_seconds = 0

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600.0

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = true
    timeout = 900.0

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660.0

[keybinds]
down = [ "Down", "Ctrl+j" ]
left = [ "Left", "Ctrl+h" ]
right = [ "Right", "Ctrl+l" ]
tab_next = [ "Tab", "Ctrl+u" ]
tab_previous = [ "Shift+ISO_Left_Tab", "Ctrl+i" ]
up = [ "Up", "Ctrl+k" ]

[lockscreen]
fingerprint = false

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [
