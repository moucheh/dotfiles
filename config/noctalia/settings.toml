[bar.default]
background_opacity = 0.64999998547136784
center = [ "clock", "notifications", "weather", "privacy" ]
end = [ "tray", "clipboard", "network", "bluetooth", "sysmon", "volume", "battery", "session" ]
margin_edge = 0
margin_ends = 0
radius = 0
start = [ "launcher", "workspaces", "active_window", "media", "audio_visualizer" ]
widget_spacing = 10

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "noctalia/screen_recorder:toggle"

[[control_center.shortcuts]]
type = "notification"

